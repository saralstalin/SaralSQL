<svg width="1280" height="430" viewBox="0 0 1280 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SaralSQL diagnostic for a self-comparison join condition</title>
  <desc id="desc">A SQL join condition compares e.DepartmentId to itself and SaralSQL reports the issue.</desc>
  <rect width="1280" height="430" fill="#1e1e1e"/>
  <rect x="18" y="18" width="520" height="54" fill="#203040" stroke="#35557a" stroke-width="2"/>
  <text x="28" y="52" fill="#7db2f2" font-family="Consolas, monospace" font-size="30">CREATE PROCEDURE</text>
  <text x="304" y="52" fill="#d4d4d4" font-family="Consolas, monospace" font-size="30">GetEmployeeDepartment</text>
  <text x="26" y="128" fill="#7db2f2" font-family="Consolas, monospace" font-size="30">AS</text>
  <text x="26" y="182" fill="#7db2f2" font-family="Consolas, monospace" font-size="30">BEGIN</text>
  <text x="92" y="236" fill="#7db2f2" font-family="Consolas, monospace" font-size="30">SELECT</text>
  <text x="224" y="236" fill="#d4d4d4" font-family="Consolas, monospace" font-size="30">d.DepartmentId</text>
  <text x="92" y="290" fill="#7db2f2" font-family="Consolas, monospace" font-size="30">FROM</text>
  <text x="190" y="290" fill="#d4d4d4" font-family="Consolas, monospace" font-size="30">Employee e</text>
  <text x="92" y="344" fill="#7db2f2" font-family="Consolas, monospace" font-size="30">JOIN</text>
  <text x="190" y="344" fill="#d4d4d4" font-family="Consolas, monospace" font-size="30">Department d</text>
  <text x="444" y="344" fill="#7db2f2" font-family="Consolas, monospace" font-size="30">ON</text>
  <text x="506" y="344" fill="#d4d4d4" font-family="Consolas, monospace" font-size="30">e.DepartmentId = e.DepartmentId</text>
  <path d="M506 356 q8 -10 16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0 t16 0" fill="none" stroke="#d7ba39" stroke-width="3"/>
  <rect x="386" y="80" width="850" height="154" rx="14" fill="#252526" stroke="#454545" stroke-width="2"/>
  <text x="410" y="130" fill="#d4d4d4" font-family="Consolas, monospace" font-size="30">Condition compares 'e.DepartmentId' to itself</text>
  <text x="936" y="130" fill="#858585" font-family="Consolas, monospace" font-size="26">SaralSQL Parser</text>
  <line x1="386" y1="158" x2="1236" y2="158" stroke="#333"/>
  <text x="410" y="206" fill="#6ca0ff" font-family="Consolas, monospace" font-size="26">View Problem</text>
  <text x="610" y="206" fill="#6ca0ff" font-family="Consolas, monospace" font-size="26">Quick Fix...</text>
</svg>
